<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
  </head>
  <body>
    {# Flash Message #} {% for message in getFlashedMessages(request) %}
    <div class="{{ message.category }}">{{ message.message}}</div>
    {% endfor %} {# Flash Ends #}
    <div>
      <form action="/login" method="post">
        <label for="username">Username</label>
        <br />
        <input
          type="text"
          name="username"
          required
          value="{{ username if username else ''}}"
        />
        <br />
        <label for="password">Password</label>
        <br />
        <input type="password" name="password" required />
        <br />
        <input type="submit" value="login" />
      </form>
      <a href="{{request.url_for('createUserPage')}}">create a user</a>
    </div>
  </body>
</html>

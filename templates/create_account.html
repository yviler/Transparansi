<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>create account</title>
  </head>
  <body>
    {# Flash Message #} {% for message in get_flashed_messages(request) %}
    <div class="{{ message.category }}">{{ message.message}}</div>
    {% endfor %} {# Flash Ends #}
    <div>
      <form action="/create_user" method="post">
        <label for="username">Username</label>
        <br />
        <input type="text" name="username" required />
        <br />
        <label for="full_name">Full Name</label>
        <br />
        <input
          type="text"
          name="full_name"
          required
          value="{{ data.full_name if data else ''}}"
        />
        <br />
        <label for="date_of_birth">Date of Birth</label>
        <br />
        <input
          type="date"
          name="date_of_birth"
          required
          value="{{ data.date_of_birth if data else ''}}"
        />
        <br />
        <label for="password">Password</label>
        <br />
        <input type="password" name="password" required />
        <br />
        <label for="password_confirm">Confirm Password</label>
        <br />
        <input type="password" name="password_confirm" required />
        <br />
        <input type="submit" value="submit" />
      </form>
      <a href="{{request.url_for('loginPage')}}">back to login</a>
    </div>
  </body>
</html>

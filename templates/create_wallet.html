{% extends "base.html" %} {% block title %} create wallet {% endblock %}{% block
content %}
<div class="border border-black items-center flex justify-center">
  <form class="p-10" action="{{request.url_for('createWallet')}}" method="post">
    <label for="wallet_name">Name</label>
    <br />
    <input
      type="text"
      name="wallet_name"
      value="{{wallet.wallet_name if wallet else ''}}"
      required
    />
    <br />
    <label for="description">Description</label>
    <br />
    <input
      type="text"
      name="description"
      value="{{ wallet.description if wallet else ''}}"
    />
    <br />
    <label for="wallet_type">Type</label>
    <br />
    <label>
      <input type="radio" name="wallet_type" value="system" />
      system
    </label>
    <label>
      <input type="radio" name="wallet_type" value="project" />
      project
    </label>
    <br />
    <a href="{{request.url_for('dashboardPage')}}">cancel</a>
    <input type="submit" value="submit" />
  </form>
</div>

{% endblock %}

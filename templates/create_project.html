{% extends "base.html" %} {% block title %} create project {% endblock %}{%
block content %}
<div class="border border-black items-center flex justify-center">
  <form
    class="p-10"
    action="{{request.url_for('createProject')}}"
    method="post"
  >
    <label for="project_name">Name</label>
    <br />
    <input
      type="text"
      name="project_name"
      value="{{project.project_name if project else ''}}"
      required
    />
    <br />
    <label for="description">Description</label>
    <br />
    <input
      type="text"
      name="description"
      value="{{ project.description if project else ''}}"
    />
    <br />
    <label for="wallet_id">Budget origin</label>
    <br />
    {% if wallets %}
    <select name="wallet_id">
      {% for wallet in wallets %}
      <option value="{{wallet.id}}" id="{{wallet.id}}">
        {{wallet.wallet_name}}
      </option>
      {% endfor %}
    </select>
    {% else %}
    <p>no unused wallets</p>
    {% endif %}
    <br />
    <label for="expected_budget">Initial Expected Budget</label>
    <br />
    {# input for budget needs to be processed to show currency #}
    <input
      type="number"
      name="expected_budget"
      required
      value="{{ project.expected_budget if project else ''}}"
      min="0"
    />
    <br />
    <a href="{{request.url_for('dashboardPage')}}">cancel</a>
    <input type="submit" value="submit" />
  </form>
</div>

{% endblock %}
